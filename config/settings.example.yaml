# MediaMatrix 配置文件
# 复制此文件为 settings.yaml 并填入你的配置
# cp config/settings.example.yaml config/settings.yaml

app:
  host: "0.0.0.0"
  port: 8000

media:
  # 媒体库根目录，支持配置多个路径（Docker 挂载路径）
  paths:
    - /media/movies
    - /media/tv
  # 刮削策略：
  #   missing_only - 仅处理缺少 NFO 的媒体（推荐）
  #   overwrite    - 强制覆盖已有 NFO
  scrape_mode: missing_only
  # 自动整理目录：刮削完成后自动创建 "电影名 (年份)/" 子目录并移入文件
  # 默认关闭，开启前请确认媒体库路径正确，避免文件被移到错误位置
  auto_organize: false
  # 支持的视频文件扩展名
  video_extensions:
    - .mkv
    - .mp4
    - .avi
    - .mov
    # .ts 同时是 TypeScript 文件扩展名，默认不启用，MPEG-TS 用户可手动取消注释
    # - .ts
  # 支持的音乐文件扩展名
  music_extensions:
    - .flac
    - .mp3
    - .aac
    - .wav
    - .m4a

providers:
  # 各 Provider 默认优先级：tmdb=1, tvdb=2, omdb=3, llm=99
  # 可在每个 Provider 下添加 priority 字段覆盖默认值，数字越小越优先
  # 注意：调整某个 Provider 的优先级时，需同步调整其他 Provider 避免冲突
  # 例如将 llm 提升到 tvdb 之前：设 llm priority: 2，tvdb priority: 3
  tmdb:
    # TMDB API Key，申请地址：https://www.themoviedb.org/settings/api
    api_key: ""
    # 元数据语言，影响标题、简介、类型等字段
    language: zh-CN
  tvdb:
    # TVDb API Key，申请地址：https://thetvdb.com/api-information
    # 留空则不启用 TVDb，TMDB 失败时不会 fallback 到 TVDb
    api_key: ""
    # 元数据语言，使用 ISO 639-2 代码，中文为 zho，英文为 eng
    language: zho
  omdb:
    # OMDb API Key，申请地址：https://www.omdbapi.com/apikey.aspx
    # 留空则不启用 OMDb，基于 IMDB 数据，免费 tier 每天 1000 次
    api_key: ""
  llm:
    # LLM 兜底数据源，所有常规 Provider 失败后触发，留空则不启用
    # 推荐百度千帆 ERNIE，支持实时联网搜索，对中文冷门内容识别效果好
    api_key: ""
    base_url: "https://qianfan.baidubce.com/v2"
    model: "ernie-4.5-turbo-128k"
    # priority: 2  # 取消注释可将 LLM 提升到第二优先级（仅次于 TMDB）

identifier:
  # 文件名识别引擎：
  #   regex - 基于正则的快速识别（默认，无需 API，延迟低）
  #   llm   - 基于 LLM 的智能识别（处理非标准命名效果更好）
  engine: regex
  # engine 为 llm 时有效；留空则自动复用 providers.llm 的配置
  api_key: ""
  base_url: ""
  model: ""

plugins:
  # 插件目录，支持 .py 源码插件和 .so 二进制插件
  # Docker 环境使用 /plugins，本地开发使用 ./plugins
  dir: ./plugins

concurrency:
  # 最大并发 API 请求数，防止触发 TMDB 等平台的限速封禁
  max_requests: 3

logging:
  level: INFO   # DEBUG | INFO | WARNING | ERROR
  file: logs/mediamatrix.log
