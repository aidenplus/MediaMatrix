services:
  mediamatrix:
    build:
      context: .
      args:
        PUID: ${PUID:-1000}
        PGID: ${PGID:-1000}
    container_name: mediamatrix
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./config:/app/config          # 配置文件（含 settings.yaml 和 tasks.db）
      - ./logs:/app/logs              # 日志
      - ./plugins:/app/plugins        # 插件
      # 媒体库目录，按需添加或删除，容器内路径需与 settings.yaml 中的 media.paths 对应
      - ${MOVIES_PATH:-./media/movies}:/media/movies
      - ${TV_PATH:-./media/tv}:/media/tv
      - ${MUSIC_PATH:-./media/music}:/media/music
    environment:
      - TZ=${TZ:-Asia/Shanghai}
